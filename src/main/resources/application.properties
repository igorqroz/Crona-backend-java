spring.application.name=crona-backend

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:crona;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ensure SQL initialization runs (covers older and newer Spring Boot versions)
spring.datasource.initialization-mode=always
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:SQL/create-tables.sql
spring.datasource.schema=classpath:SQL/create-tables.sql

# Show SQL init logs
logging.level.org.springframework.jdbc=INFO
# Run on alternate port if 8080 is in use
server.port=8080
